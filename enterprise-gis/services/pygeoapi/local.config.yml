server:
  bind:
    host: 0.0.0.0
    port: 80
  url: http://localhost:8088/ogc
  mimetype: application/json
  encoding: utf-8
  languages: [en-US]
  pretty_print: true
  limit: 1000
  map:
    url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
    attribution: OpenStreetMap contributors
metadata:
  identification:
    title: Uganda BMS Enterprise GIS OGC API
    description: Open standards services for bridge, culvert, inspection, maintenance, and digital-twin data.
    keywords: [Uganda, bridges, culverts, BMS, OGC]
    terms_of_service: Internal government use
    url: https://example.go.ug
  license:
    name: Internal data policy
    url: https://example.go.ug
  provider:
    name: Ministry of Works and Transport
    url: https://www.works.go.ug
resources:
  structures:
    type: collection
    title: Structures
    description: National bridge and major culvert inventory
    keywords: [bridges, culverts]
    providers:
      - type: feature
        name: PostgreSQL
        data:
          host: postgis
          port: 5432
          dbname: uganda_gis
          user: uganda_gis_admin
          password: ${POSTGRES_PASSWORD}
          search_path: [integration, public]
        id_field: structure_id
        table: structure_ogc
        geom_field: geom
